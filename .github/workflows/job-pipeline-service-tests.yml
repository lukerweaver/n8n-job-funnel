name: job-pipeline-service-tests

on:
  push:
    paths:
      - "job-pipeline-service/**"
      - ".github/workflows/job-pipeline-service-tests.yml"
  pull_request:
    paths:
      - "job-pipeline-service/**"
      - ".github/workflows/job-pipeline-service-tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-pipeline-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-branch --cov-report=term-missing --cov-report=json

      - name: Enforce branch coverage >= 80%
        run: |
          python scripts/coverage_gate.py coverage.json 80
