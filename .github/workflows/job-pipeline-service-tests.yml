name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-pipeline-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov=services/scoring_service.py \
            --cov=services/scoring_parser.py \
            --cov=services/llm_client.py \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json

      - name: Enforce branch coverage >= 80%
        run: |
          python scripts/coverage_gate.py coverage.json 80

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-funnel-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: job-funnel-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  extension-tests:
    name: extension-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-scraper-chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: job-scraper-chrome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
