services:
  job-pipeline-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-pipeline-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://jobs_user:jobs_pass@postgres:5432/jobs_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: job-pipeline-postgres
    environment:
      POSTGRES_DB: jobs_db
      POSTGRES_USER: jobs_user
      POSTGRES_PASSWORD: jobs_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs_user -d jobs_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres-data:
